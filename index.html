function dishHasAvoid(dish,avoids){
  if(avoids.size===0)return false;
  const text=(dish.name+' '+dish.main.join(' ')+' '+dish.sub.join(' ')+' '+dish.steps.join(' '));
  for(const a of AVOIDS){
    if(!avoids.has(a.id))continue;
    for(const kw of a.match){
      if(text.includes(kw))return true;
    }
  }
  return false;
}
const cats=['全部','猪肉类','鸡肉类','牛肉类','鱼/海鲜','蔬菜/豆制品','汤羹类','面饭类','凉菜','蛋类'];
const catMap={'全部':'all','猪肉类':'猪肉类','鸡肉类':'鸡肉类','牛肉类':'牛肉类','鱼/海鲜':'鱼/海鲜','蔬菜/豆制品':'蔬菜/豆制品','汤羹类':'汤羹类','面饭类':'面饭类','凉菜':'凉菜','蛋类':'蛋类'};

function init(){
const f=document.getElementById('filters');
f.innerHTML=cats.map(c=>`<span class="filter${c==='全部'?' active':''}" data-cat="${catMap[c]}" onclick="setCat('${catMap[c]}',this)">${c}</span>`).join('');

const ab=document.getElementById('avoidBar');
ab.innerHTML='<span class="avoid-label">🚫 忌口：</span>'+AVOIDS.map(a=>`<span class="avoid-tag" data-avoid="${a.id}" onclick="toggleAvoid('${a.id}',this)">${a.label}</span>`).join('');

document.getElementById('count').textContent=`共 ${DISHES.length} 道菜 · 点击随机选菜或按空格键`;
}

function setCat(cat,el){
currentCat=cat;
document.querySelectorAll('.filter').forEach(e=>e.classList.remove('active'));
el.classList.add('active');
roll();
}

function toggleAvoid(id,el){
if(avoids.has(id)){avoids.delete(id);el.classList.remove('active');}
else{avoids.add(id);el.classList.add('active');}
updateCount();
}

function updateCount(){
const pool=getFiltered();
const total=currentCat==='all'?DISHES.length:DISHES.filter(d=>d.cat===currentCat).length;
document.getElementById('count').textContent='当前分类:'+(currentCat==='all'?'全部':currentCat)+' · 可选'+pool.length+'道'+(avoids.size?' (已排除'+(total-pool.length)+'道)':'');
}

function getFiltered(){
let pool=currentCat==='all'?DISHES:DISHES.filter(d=>d.cat===currentCat);
pool=pool.filter(d=>!dishHasAvoid(d,avoids));
return pool;
}

function roll(){
const pool=getFiltered();
if(!pool.length){alert('该分类暂无菜品');return;}
let idx;const last=history[0];
do{idx=Math.floor(Math.random()*pool.length);}while(pool.length>1&&last&&pool[idx].name===last);
const dish=pool[idx];
history.unshift(dish.name);if(history.length>15)history.pop();
render(dish);renderHistory();
const card=document.getElementById('card');
card.style.transform='scale(1.02)';setTimeout(()=>card.style.transform='',150);
updateCount();
}

function render(dish){
const r=document.getElementById('result');
r.innerHTML=`<div class="dish-name">${dish.name}</div><div class="dish-tag">${dish.tag} · ${dish.cat}</div>
<div class="section"><div class="section-title">🛒 主要食材</div><div class="ingredients">${dish.main.map(i=>`<span class="ing-tag main">${i}</span>`).join('')}</div></div>
<div class="section"><div class="section-title">🧂 调料辅料</div><div class="ingredients">${dish.sub.map(i=>`<span class="ing-tag">${i}</span>`).join('')}</div></div>
<div class="section"><div class="section-title">👨‍🍳 做法</div><ol class="steps">${dish.steps.map((s,i)=>`<li>${s}</li>`).join('')}</ol></div>`;
document.querySelector('.placeholder').style.display='none';
r.style.display='block';
document.getElementById('card').classList.add('active');
}

function renderHistory(){
document.getElementById('history').innerHTML=history.filter((v,i,a)=>a.indexOf(v)===i).slice(0,10).map(h=>`<span class="hist-tag">${h}</span>`).join('');
}

function copyResult(){
const text=document.getElementById('card').innerText;
copyTextCompat(text);
}

function share(){
if(!currentDish)return;
const canvas=document.getElementById('shareCanvas');
const ctx=canvas.getContext('2d');
const W=750,H=Math.max(900,680+currentDish.steps.length*52);

canvas.width=W;canvas.height=H;

// Background
const bg=ctx.createLinearGradient(0,0,0,H);
bg.addColorStop(0,'#1a1a2e');bg.addColorStop(0.5,'#16213e');bg.addColorStop(1,'#0f3460');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

// Orange accent top bar
ctx.fillStyle='#FF8C00';ctx.fillRect(0,0,W,6);

// Emoji + Title
ctx.fillStyle='#FF8C00';ctx.font='bold 48px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.textAlign='center';
ctx.fillText('🍳 '+currentDish.name, W/2, 90);

// Tag
ctx.font='24px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillStyle='rgba(255,140,0,0.8)';
ctx.fillText(currentDish.tag+' · '+currentDish.cat, W/2, 135);

// Divider
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(60,160);ctx.lineTo(W-60,160);ctx.stroke();

let y=205;

// Main Ingredients
ctx.textAlign='left';
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillText('🛒 主要食材', 60, y);y+=38;

ctx.font='20px "PingFang SC","Microsoft YaHei",sans-serif';
currentDish.main.forEach(i=>{
  const tw=ctx.measureText(i).width+28;
  if(60+tw>W-60){y+=34;}
  ctx.fillStyle='rgba(255,152,0,0.2)';
  ctx.fillRect(60,y-24,tw,32);
  ctx.fillStyle='#FFB74D';
  ctx.fillText(i,74,y);
  y+=44;
});
y+=10;

// Sub ingredients
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillText('🧂 调料辅料', 60, y);y+=38;
ctx.font='20px "PingFang SC","Microsoft YaHei",sans-serif';
currentDish.sub.forEach(i=>{
  const tw=ctx.measureText(i).width+28;
  ctx.fillStyle='rgba(76,175,80,0.15)';
  ctx.fillRect(60,y-24,tw,32);
  ctx.fillStyle='#81C784';
  ctx.fillText(i,74,y);
  y+=44;
});
y+=10;

// Steps
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.fillText('👨‍🍳 做法', 60, y);y+=38;
ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='19px "PingFang SC","Microsoft YaHei",sans-serif';
currentDish.steps.forEach((s,i)=>{
  const stepText=(i+1)+'. '+s;
  const lines=wrapText(ctx,stepText,W-120);
  lines.forEach(line=>{
    ctx.fillText(line,60,y);
    y+=36;
  });
  y+=4;
});

// Footer
y+=20;
ctx.strokeStyle='rgba(255,255,255,0.1)';
ctx.beginPath();ctx.moveTo(60,y);ctx.lineTo(W-60,y);ctx.stroke();
y+=35;
ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.textAlign='center';
ctx.fillText('🍳 今晚吃什么 · 200道家常菜', W/2, y);
ctx.fillText('grapewang88-wq.github.io/dinner', W/2, y+30);

// Show image
const img=document.getElementById('shareImg');
img.src=canvas.toDataURL('image/png');
document.getElementById('shareModal').style.display='flex';
img.onload=()=>{showToast('📸 长按图片 → 保存 → 去微信发送');};
}

function wrapText(ctx,text,maxWidth){
const words=text.split('');const lines=[];let line='';
for(let i=0;i<words.length;i++){
  const test=line+words[i];
  if(ctx.measureText(test).width>maxWidth&&line.length>0){lines.push(line);line=words[i];}
  else{line=test;}
}
lines.push(line);return lines;
}

let currentDish=null;
// Hook into render to save current dish
const _origRender=render;
render=function(dish){currentDish=dish;_origRender(dish);};

function closeModal(){
document.getElementById('shareModal').style.display='none';
}

function copyTextCompat(text){
// 兼容微信等沙盒浏览器: 创建临时文本框让用户手动复制
const old=document.getElementById('_copyarea');
if(old)old.remove();
const ta=document.createElement('textarea');
ta.id='_copyarea';
ta.value=text;
ta.style.cssText='position:fixed;top:10%;left:5%;width:90%;height:40%;z-index:9999;background:#1a1a2e;color:#fff;border:2px solid #FF8C00;border-radius:12px;padding:16px;font-size:14px;line-height:1.6;resize:none;font-family:inherit';
document.body.appendChild(ta);
ta.select();
ta.focus();
try{navigator.clipboard.writeText(text).then(()=>showToast('✅ 已复制！去微信粘贴发送'));}catch(e){}
showToast('📋 文字已选中，长按 → 全选 → 复制 → 去微信粘贴');
ta.addEventListener('blur',()=>setTimeout(()=>ta.remove(),300));
}

function showToast(msg){
const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();roll();}});
init();
</script>
<canvas id="shareCanvas" style="display:none"></canvas>
<div id="shareModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto" onclick="closeModal()">
<img id="shareImg" style="max-width:100%;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5)" alt="菜品卡片">
<p style="color:rgba(255,255,255,0.6);font-size:14px;margin-top:16px;text-align:center">👆 长按图片保存 → 去微信发送</p>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
